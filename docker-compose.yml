services:
  db:
    image: postgres:16-alpine
    container_name: prestamos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?Defina DB_NAME en el archivo .env}
      POSTGRES_USER: ${DB_USER:?Defina DB_USER en el archivo .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD en el archivo .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prestamos-app:local
    container_name: prestamos-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:?Defina DB_NAME en el archivo .env}
      DB_USER: ${DB_USER:?Defina DB_USER en el archivo .env}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD en el archivo .env}
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-false}
      APP_API_KEY: ${APP_API_KEY:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: prestamos-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?Defina PGADMIN_EMAIL en el archivo .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Defina PGADMIN_PASSWORD en el archivo .env}
    ports:
      - "${PGADMIN_PORT:-8082}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  db-data:
  pgadmin-data:
