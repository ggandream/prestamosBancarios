name: CI/CD

on:
  push:
    branches: [main, "feature/**", "codex/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, tests y cobertura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Compilar y ejecutar tests
        run: mvn -B -ntp clean verify

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: reporte-jacoco
          path: target/site/jacoco/
          if-no-files-found: error

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-tests
          path: target/surefire-reports/
          if-no-files-found: warn

  compose-smoke:
    name: Docker Compose desde cero
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar credenciales efimeras para CI
        shell: bash
        run: |
          {
            echo "DB_NAME=prestamos_ci"
            echo "DB_USER=prestamos_ci"
            echo "DB_PASSWORD=$(openssl rand -hex 24)"
            echo "APP_SECURITY_ENABLED=false"
            echo "APP_API_KEY=$(openssl rand -hex 24)"
            echo "PGADMIN_EMAIL=ci@example.invalid"
            echo "PGADMIN_PASSWORD=$(openssl rand -hex 24)"
          } > .env

      - name: Levantar aplicacion y base de datos
        run: docker compose up --build --detach db app

      - name: Esperar healthcheck de la aplicacion
        shell: bash
        run: |
          for intento in {1..36}; do
            if curl --fail --silent http://localhost:8080/actuator/health; then
              echo
              docker compose ps
              exit 0
            fi
            echo "Esperando aplicacion saludable ($intento/36)..."
            sleep 5
          done
          docker compose ps
          exit 1

      - name: Verificar API y datos semilla (fases 3-4)
        shell: bash
        run: |
          # El perfil dev siembra la cartera de demostracion; el seed espera la
          # evaluacion asincrona de cada solicitud, por eso se sondea con reintentos.
          for intento in {1..12}; do
            total=$(curl --fail --silent http://localhost:8080/api/reportes/cartera \
              | grep -o '"totalPrestamos":[0-9]*' | cut -d: -f2 || echo 0)
            if [[ "${total:-0}" -ge 4 ]]; then
              echo "Cartera sembrada con $total prestamos"
              curl --fail --silent http://localhost:8080/api/reportes/cartera
              echo
              exit 0
            fi
            echo "Esperando datos semilla ($intento/12)..."
            sleep 5
          done
          echo "La API no expuso los datos semilla a tiempo"
          exit 1

      - name: Mostrar logs si ocurre un error
        if: failure()
        run: docker compose logs --no-color app db

      - name: Detener servicios y eliminar volumenes
        if: always()
        run: docker compose down --volumes --remove-orphans

  docker-image:
    name: Imagen Docker
    needs: [build-test, compose-smoke]
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determinar publicación
        id: registry
        shell: bash
        run: |
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" && -n "$DOCKERHUB_IMAGE" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "image=$DOCKERHUB_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "image=prestamos-app" >> "$GITHUB_OUTPUT"
          fi

      - name: Iniciar sesión en Docker Hub
        if: steps.registry.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Construir imagen y publicar si hay secrets
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.registry.outputs.push == 'true' }}
          load: ${{ steps.registry.outputs.push != 'true' }}
          tags: |
            ${{ steps.registry.outputs.image }}:${{ steps.registry.outputs.push == 'true' && 'latest' || 'ci' }}
            ${{ steps.registry.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
